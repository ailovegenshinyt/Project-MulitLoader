<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiLoader - Premium Multi-Source Downloader</title>
    <meta name="description" content="Download YouTube Videos, Playlists, and Spotify Music in High Quality.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="liquid-bg">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header>
            <h1>MultiLoader</h1>
            <p class="subtitle">Premium Video &amp; Music Downloader (4K &amp; Playlist Support)</p>
        </header>

        <!-- Tab Switcher -->
        <div class="tab-switcher">
            <button class="tab-btn active" id="tabUrlBtn" onclick="switchTab('url')">🔗 URL Download</button>
            <button class="tab-btn" id="tabSearchBtn" onclick="switchTab('search')">🔍 Search Spotify</button>
        </div>

        <!-- URL Tab -->
        <section id="urlTab" class="tab-content">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Paste YouTube / Spotify URL here..." autocomplete="off">
            </div>
            <div class="options">
                <div class="select-wrapper">
                    <select id="formatSelect">
                        <option value="video">Video (MP4)</option>
                        <option value="audio">Audio (MP3)</option>
                        <option value="wav">Audio (WAV)</option>
                    </select>
                </div>
                <div class="select-wrapper">
                    <select id="qualitySelect">
                        <option value="4k">Video: 4K / Audio: 320kbps</option>
                        <option value="1080p">Video: 1080p / Audio: 256kbps</option>
                        <option value="720p">Video: 720p / Audio: 192kbps</option>
                        <option value="480p">Video: 480p / Audio: 128kbps</option>
                    </select>
                </div>
            </div>
            <button id="downloadBtn">Start Download</button>
        </section>

        <!-- Search Tab -->
        <section id="searchTab" class="tab-content" style="display:none;">
            <div class="search-group">
                <input type="text" id="searchInput" placeholder="Search song, artist, album on Spotify..."
                    autocomplete="off">
                <button id="searchBtn" onclick="doSearch()">Search</button>
            </div>
            <div id="searchResults"></div>
        </section>

        <!-- Terminal (shared) -->
        <div id="terminalArea" style="display:none; margin-top:1.5rem;">
            <p style="font-size:0.8rem; color:var(--text-dim); margin-bottom:0.5rem; font-family:monospace;">Terminal
                Output:</p>
            <div id="terminalBody"
                style="background:rgba(0,0,0,0.4); border:1px solid var(--glass-border); border-radius:12px; padding:1rem; height:160px; overflow-y:auto; font-family:'Courier New',Courier,monospace; font-size:0.75rem; color:#4ade80; line-height:1.6; scroll-behavior:smooth;">
                <div>Welcome to MultiLoader Engine...</div>
            </div>
        </div>

        <!-- Integrated Footer -->
        <div style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
            <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 1rem;">
                Created with ❤️ by <span style="color: var(--text-main); font-weight: 600;">CoR3 Coding-R</span>
            </p>
            <div style="display: flex; justify-content: center; gap: 0.6rem; flex-wrap: wrap;">
                <a href="https://github.com/ailovegenshinyt" target="_blank"
                    style="color: var(--text-main); text-decoration: none; font-size: 0.75rem; padding: 0.35rem 0.8rem; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); border-radius: 20px; transition: 0.3s;"
                    onmouseover="this.style.background='rgba(139,92,246,0.2)'"
                    onmouseout="this.style.background='rgba(255,255,255,0.08)'">
                    👤 GitHub Profile
                </a>
                <a href="https://github.com/ailovegenshinyt/Project-MulitLoader" target="_blank"
                    style="color: var(--text-main); text-decoration: none; font-size: 0.75rem; padding: 0.35rem 0.8rem; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); border-radius: 20px; transition: 0.3s;"
                    onmouseover="this.style.background='rgba(139,92,246,0.2)'"
                    onmouseout="this.style.background='rgba(255,255,255,0.08)'">
                    📦 GitHub Repository
                </a>
            </div>
            <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 1rem; opacity: 0.6;">
                &copy; 2026 MultiLoader — Open Source & Community Driven
            </p>
        </div>
    </main>

    <script src="main.js"></script>
</body>

</html>
